<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="body" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d2d4a"/>
      <stop offset="100%" stop-color="#071828"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="64" height="64" rx="10" fill="#091724"/>

  <g transform="rotate(12 32 32)">
    <!-- pins -->
    <g stroke="#1a7fa8" stroke-width="2.2" stroke-linecap="round" opacity="0.95" fill="none">
      <!-- top -->
      <line x1="16" y1="9" x2="16" y2="4"/>
      <line x1="24" y1="9" x2="24" y2="4"/>
      <line x1="32" y1="9" x2="32" y2="4"/>
      <line x1="40" y1="9" x2="40" y2="4"/>
      <line x1="48" y1="9" x2="48" y2="4"/>

      <!-- bottom -->
      <line x1="16" y1="55" x2="16" y2="60"/>
      <line x1="24" y1="55" x2="24" y2="60"/>
      <line x1="32" y1="55" x2="32" y2="60"/>
      <line x1="40" y1="55" x2="40" y2="60"/>
      <line x1="48" y1="55" x2="48" y2="60"/>

      <!-- left -->
      <line x1="9" y1="16" x2="4" y2="16"/>
      <line x1="9" y1="24" x2="4" y2="24"/>
      <line x1="9" y1="32" x2="4" y2="32"/>
      <line x1="9" y1="40" x2="4" y2="40"/>
      <line x1="9" y1="48" x2="4" y2="48"/>

      <!-- right -->
      <line x1="55" y1="16" x2="60" y2="16"/>
      <line x1="55" y1="24" x2="60" y2="24"/>
      <line x1="55" y1="32" x2="60" y2="32"/>
      <line x1="55" y1="40" x2="60" y2="40"/>
      <line x1="55" y1="48" x2="60" y2="48"/>
    </g>

    <!-- chip body -->
    <rect x="9" y="9" width="46" height="46" rx="8"
          fill="url(#body)" stroke="#1a7fa8" stroke-width="2.2"/>

    <!-- inner core -->
    <rect x="19" y="19" width="26" height="26" rx="4"
          fill="#10243a" stroke="#1a7fa8" stroke-width="1.8"/>
  </g>
</svg>