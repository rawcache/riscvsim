<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StudyRISC-V Simulator</title>
    <meta
      name="description"
      content="Assemble, step, and inspect RISC-V programs in a local-first browser simulator."
    />
    <link rel="canonical" href="https://studyriscv.com/simulator/" />
    <script>
      (() => {
        const { hash, origin, pathname, search } = window.location;
        if (pathname === "/simulator") {
          const target = new URL("/simulator/", origin);
          target.search = search;
          target.hash = hash;
          window.location.replace(target.toString());
        }
      })();
    </script>
    <script>
      (() => {
        try {
          const storedTheme = window.localStorage.getItem("studyriscv-theme");
          const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          if (storedTheme === "dark" || (!storedTheme && prefersDark)) {
            document.documentElement.dataset.theme = "dark";
          }
        } catch {
          // Ignore storage access failures and fall back to the default theme.
        }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500;700&family=Inter:wght@400;500;700&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/geist@1.3.1/dist/fonts/geist-sans/style.css"
    />
    <link rel="stylesheet" href="../src/styles/tokens.css" />
    <link rel="stylesheet" href="../src/styles/auth.css" />
    <link rel="stylesheet" href="../src/styles/simulator.css" />
    <link rel="icon" type="image/svg+xml" href="../favicon-chip.svg" />
  </head>
  <body class="simulator-page">
    <div id="assembleProgress" class="assemble-progress" aria-hidden="true"></div>
    <nav class="sim-nav" aria-label="Simulator navigation">
      <div class="sim-nav__inner">
        <div class="sim-nav__brand-row">
          <a class="sim-brand" href="/">StudyRISC-V</a>
          <button
            id="simNavToggle"
            class="sim-nav__mobile-toggle"
            type="button"
            aria-expanded="false"
            aria-controls="simNavMobileMenu"
            aria-label="Toggle navigation"
          >
            <span></span>
            <span></span>
            <span></span>
          </button>
        </div>
        <div class="sim-nav__actions">
          <div class="sim-nav__links">
            <a href="/simulator/" aria-current="page">Simulator</a>
            <a href="/about/">About</a>
            <a href="/docs/">Docs</a>
            <a href="https://github.com/sseth30/riscvsim" target="_blank" rel="noreferrer">GitHub</a>
          </div>
          <span id="statusBadge" class="status-badge status-badge--ready">Ready</span>
          <div class="auth-nav">
            <button id="auth-signin-btn" class="auth-signin-btn" type="button">Sign in</button>
            <div class="auth-menu">
              <button id="auth-user-btn" class="auth-user-btn" type="button" hidden></button>
              <div id="auth-dropdown" class="auth-dropdown" hidden>
                <div id="auth-email" class="auth-dropdown__email"></div>
                <div id="auth-tier" class="auth-dropdown__tier"></div>
                <div class="auth-dropdown__divider"></div>
                <button id="auth-signout-btn" class="auth-dropdown__signout" type="button">Sign out</button>
              </div>
            </div>
          </div>
          <button id="simThemeToggle" class="theme-toggle" type="button" aria-label="Toggle theme">
            <span class="theme-toggle__icon theme-toggle__icon--sun" aria-hidden="true">
              <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8">
                <circle cx="12" cy="12" r="4"></circle>
                <path d="M12 2v3M12 19v3M4.93 4.93l2.12 2.12M16.95 16.95l2.12 2.12M2 12h3M19 12h3M4.93 19.07l2.12-2.12M16.95 7.05l2.12-2.12"></path>
              </svg>
            </span>
            <span class="theme-toggle__icon theme-toggle__icon--moon" aria-hidden="true">
              <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8">
                <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"></path>
              </svg>
            </span>
          </button>
        </div>
        <div id="simNavMobileMenu" class="sim-nav__mobile-menu" hidden>
          <a href="/simulator/" aria-current="page">Simulator</a>
          <a href="/about/">About</a>
          <a href="/docs/">Docs</a>
          <a href="https://github.com/sseth30/riscvsim" target="_blank" rel="noreferrer">GitHub</a>
        </div>
      </div>
    </nav>

    <main class="simulator-app">
      <div class="simulator-layout">
        <div class="sim-column sim-column--left">
          <section class="sim-panel sim-panel--editor">
            <div class="panel-header">
              <span>Program Input</span>
              <div class="panel-header__actions">
                <span id="saveProgramDirtyIndicator" class="program-save__dirty" hidden></span>
                <button
                  id="save-program-btn"
                  class="panel-icon-button"
                  type="button"
                  aria-label="Save program"
                  title="Save program"
                  hidden
                >
                  <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8">
                    <path d="M5 4h11l3 3v13H5z"></path>
                    <path d="M8 4v6h8"></path>
                    <path d="M9 18h6"></path>
                  </svg>
                </button>
                <button
                  id="shareSource"
                  class="panel-icon-button"
                  type="button"
                  aria-label="Copy shareable link"
                  title="Copy shareable link"
                >
                  <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8">
                    <path d="M10 13a5 5 0 0 0 7.54.54l2.46-2.46a5 5 0 0 0-7.07-7.07L11.5 5.43"></path>
                    <path d="M14 11a5 5 0 0 0-7.54-.54L4 12.92a5 5 0 0 0 7.07 7.07l1.43-1.43"></path>
                  </svg>
                </button>
                <button
                  id="copySource"
                  class="panel-icon-button"
                  type="button"
                  aria-label="Copy assembly source"
                  title="Copy assembly source"
                >
                  <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8">
                    <rect x="9" y="9" width="10" height="10" rx="2"></rect>
                    <path d="M5 15H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v1"></path>
                  </svg>
                </button>
              </div>
            </div>
            <div id="sharedLinkBanner" class="shared-link-banner" hidden>
              <span>Loaded from shared link · Edit to make it yours</span>
              <button id="dismissSharedBanner" class="shared-link-banner__dismiss" type="button" aria-label="Dismiss shared link banner">
                ×
              </button>
            </div>
            <div class="panel-body">
              <label class="field-label" for="sampleSelect">Sample Program</label>
              <select id="sampleSelect" class="sim-select">
                <option value="arraySum">Array sum (sensor readings)</option>
                <option value="stringLength">String length</option>
                <option value="memoryCopy">Memory copy</option>
                <option value="functionCall">Function call (calling convention)</option>
                <option value="recursiveFactorial">Recursive factorial</option>
                <option value="tempConvert">Temp conversion (mul/div)</option>
                <option value="checksum">XOR checksum</option>
                <option value="bubbleSortData">Bubble sort (data segment)</option>
                <option value="stringCopyData">String copy (data + .asciz)</option>
                <option value="syscall">Syscall (ecall)</option>
              </select>

              <div class="control-row control-row--editor-primary">
                <button id="assemble" class="sim-button sim-button--primary" type="button">Assemble</button>
              </div>
              <div class="control-row control-row--editor-secondary">
                <button id="step" class="sim-button sim-button--outline" type="button" disabled>Step</button>
                <button id="stepBack" class="sim-button sim-button--outline" type="button" disabled>Step Back</button>
                <button id="run" class="sim-button sim-button--outline" type="button" disabled>Run</button>
                <button id="reset" class="sim-button sim-button--danger" type="button" disabled>Reset</button>
              </div>
              <p class="shortcut-hint">Enter: Assemble · ↓: Step · Shift+↓: Step Back · R: Run</p>

              <div class="editor-container">
                <div class="line-numbers" id="line-numbers" aria-hidden="true"></div>
                <div class="editor-inner">
                  <div class="highlight-display" id="highlight-display" aria-hidden="true"></div>
                  <textarea
                    id="source-input"
                    class="source-textarea"
                    placeholder="Paste RV32 assembly here..."
                    wrap="off"
                    spellcheck="false"
                    autocorrect="off"
                    autocapitalize="off"
                    autocomplete="off"
                  ></textarea>
                </div>
              </div>

              <div id="status" class="status-line" aria-live="polite"></div>
            </div>
          </section>

          <section id="savedProgramsPanel" class="sim-panel programs-panel" hidden>
            <div class="panel-header panel-header--collapsible">
              <span>SAVED PROGRAMS</span>
              <button
                id="savedProgramsToggle"
                class="panel-toggle"
                type="button"
                aria-expanded="true"
                aria-controls="savedProgramsBody"
                title="Collapse saved programs"
              >
                <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8">
                  <path d="m6 9 6 6 6-6"></path>
                </svg>
              </button>
            </div>
            <div id="savedProgramsBody" class="panel-body programs-panel__body"></div>
          </section>

          <section id="historyPanel" class="sim-panel programs-panel" hidden>
            <div class="panel-header panel-header--collapsible">
              <span>HISTORY</span>
              <button
                id="historyToggle"
                class="panel-toggle"
                type="button"
                aria-expanded="true"
                aria-controls="historyBody"
                title="Collapse history"
              >
                <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8">
                  <path d="m6 9 6 6 6-6"></path>
                </svg>
              </button>
            </div>
            <div id="historyBody" class="panel-body programs-panel__body"></div>
          </section>
        </div>

        <div class="sim-column sim-column--center">
          <section class="sim-panel sim-panel--center-tabs">
            <div class="center-tabs" role="tablist" aria-label="Simulator center panels">
              <button
                id="centerTabDisassembly"
                class="center-tab-button is-active"
                type="button"
                role="tab"
                aria-selected="true"
                aria-controls="centerPanelDisassembly"
                data-center-tab="disassembly"
              >
                <span>Disassembly</span>
              </button>
              <button
                id="centerTabCallStack"
                class="center-tab-button"
                type="button"
                role="tab"
                aria-selected="false"
                aria-controls="centerPanelCallStack"
                data-center-tab="call-stack"
              >
                <span>Call Stack</span>
              </button>
              <button
                id="centerTabEffects"
                class="center-tab-button"
                type="button"
                role="tab"
                aria-selected="false"
                aria-controls="centerPanelEffects"
                data-center-tab="effects"
              >
                <span>Effects</span>
              </button>
              <button
                id="centerTabPseudoC"
                class="center-tab-button"
                type="button"
                role="tab"
                aria-selected="false"
                aria-controls="centerPanelPseudoC"
                data-center-tab="pseudo-c"
              >
                <span>Pseudo-C</span>
              </button>
            </div>

            <div class="center-tabs__content">
              <section
                id="centerPanelDisassembly"
                class="center-tab-panel is-active"
                role="tabpanel"
                aria-labelledby="centerTabDisassembly"
                data-center-panel="disassembly"
              >
                <div class="center-tab-panel__header">
                  <span>Disassembly</span>
                  <span id="pc" class="pc-pill"></span>
                </div>
                <div class="center-tab-panel__body center-tab-panel__body--disassembly">
                  <div id="disasm" class="disasm-view" aria-live="polite"></div>
                </div>
              </section>

              <section
                id="centerPanelCallStack"
                class="center-tab-panel"
                role="tabpanel"
                aria-labelledby="centerTabCallStack"
                data-center-panel="call-stack"
                hidden
              >
                <div class="center-tab-panel__body center-tab-panel__body--stack">
                  <div class="stack-tab-layout">
                    <div class="stack-view-meta">Stack grows ↓</div>
                    <div id="callStackView" class="stack-view" aria-live="polite"></div>
                    <section class="stack-legend">
                      <button
                        id="stackLegendToggle"
                        class="stack-legend__toggle"
                        type="button"
                        aria-expanded="false"
                        aria-controls="stackLegendBody"
                      >
                        <span>Register roles</span>
                        <span class="stack-legend__chevron" aria-hidden="true">⌄</span>
                      </button>
                      <div id="stackLegendBody" class="stack-legend__body" hidden></div>
                      <div id="stackExplainer" class="stack-explainer"></div>
                    </section>
                  </div>
                </div>
              </section>

              <section
                id="centerPanelEffects"
                class="center-tab-panel"
                role="tabpanel"
                aria-labelledby="centerTabEffects"
                data-center-panel="effects"
                hidden
              >
                <div class="effect-filter-bar" aria-label="Effect log filters">
                  <button id="effectFilterReg" class="effect-filter-button" type="button" aria-pressed="true">REG</button>
                  <button id="effectFilterMem" class="effect-filter-button" type="button" aria-pressed="true">MEM</button>
                  <button id="effectFilterPc" class="effect-filter-button" type="button" aria-pressed="true">PC</button>
                </div>
                <div class="center-tab-panel__body center-tab-panel__body--effects">
                  <div id="effects" class="effects-view" aria-live="polite"></div>
                </div>
              </section>

              <section
                id="centerPanelPseudoC"
                class="center-tab-panel"
                role="tabpanel"
                aria-labelledby="centerTabPseudoC"
                data-center-panel="pseudo-c"
                hidden
              >
                <div class="center-tab-panel__body center-tab-panel__body--pseudo">
                  <div id="clikeCard" class="clike-card clike-card--tab">
                    <div id="clike" class="clike-view clike-view--tab"></div>
                  </div>
                </div>
              </section>
            </div>
          </section>
        </div>

        <div class="sim-column sim-column--right">
          <section class="sim-panel sim-panel--regs">
            <div class="panel-header">Register File</div>
            <div class="panel-body">
              <div id="regs" class="regs-view"></div>
            </div>
          </section>

          <section class="sim-panel sim-panel--memory">
            <div class="panel-header panel-header--memory">
              <span>Memory</span>
              <div class="memory-header-controls">
                <input id="memAddressInput" class="memory-address-input" type="text" inputmode="text" placeholder="0x00000000" />
                <select id="memFollowSelect" class="memory-follow-select" aria-label="Memory follow register">
                  <option value="none">follow: none</option>
                  <option value="sp">follow: sp (x2)</option>
                  <option value="a0">follow: a0 (x10)</option>
                  <option value="a1">follow: a1 (x11)</option>
                  <option value="ra">follow: x1 / ra</option>
                </select>
              </div>
            </div>
            <div class="panel-body">
              <div class="memory-stack">
                <div class="memory-section">
                  <span class="memory-section__label">Recent Writes</span>
                  <div id="memWrites" class="memory-writes"></div>
                </div>
                <div class="memory-section">
                  <span class="memory-section__label">Window</span>
                  <div id="memWindow" class="memory-window"></div>
                </div>
              </div>
            </div>
          </section>
        </div>
      </div>
    </main>

    <div id="copyToast" class="copy-toast" role="status" aria-live="polite">Copied!</div>
    <script type="module" src="../src/main.ts"></script>
  </body>
</html>
